{% extends "base.html" %}

{% block title %}SMS Test Panel - Volt SMS{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <ol class="breadcrumb" style="background-color: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 12px 16px; margin-bottom: 24px;">
            <li><a href="{{ url_for('main.dashboard') }}" style="color: var(--accent);"><i class="fa fa-home"></i> Home</a></li>
            <li class="active" style="color: var(--muted);">SMS Test Panel</li>
        </ol>
    </div>
</div>

<div class="row">
    <div class="col-md-6 col-md-offset-3">
        <div class="panel">
            <div class="panel-heading">
                <span style="font-weight: 600; font-size: 16px;"><i class="fa fa-cubes" style="color: var(--accent);"></i> SMS Test Panel</span>
            </div>
            <div class="panel-body">
                <form method="POST" action="{{ url_for('main.sms_test_panel') }}">
                    <div class="form-group">
                        <label for="cli" class="control-label" style="font-weight: 500;">Originator / Sender (CLI)</label>
                        <input type="text" name="cli" id="cli" class="form-control" placeholder="e.g. Google, 12025550199" required>
                        <span class="help-block" style="font-size: 12px; color: var(--muted);">The sender ID that will appear as the source address.</span>
                    </div>

                    <div class="form-group">
                        <label for="number_id" class="control-label" style="font-weight: 500;">Target / Recipient Number</label>
                        <select name="number_id" id="number_id" class="form-control" required>
                            <option value="">-- Select Your Number --</option>
                            {% for n in my_numbers %}
                            <option value="{{ n.id }}">{{ n.number }} ({{ n.sms_range.country if n.sms_range else 'N/A' }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message" class="control-label" style="font-weight: 500;">Message Content</label>
                        <textarea name="message" id="message" rows="5" class="form-control" placeholder="Type your test SMS message here..." required></textarea>
                        <div class="text-right" style="margin-top: 5px;">
                            <span id="charCount" class="badge" style="background-color: var(--accent);">0</span> characters
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 24px;">
                        <button type="submit" class="btn btn-primary btn-block" style="background-color: var(--accent); border: none; font-weight: 600; padding: 10px 16px;">
                            <i class="fa fa-paper-plane"></i> Send Test SMS
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    $(document).ready(function() {
        $('#message').on('input', function() {
            var len = $(this).val().length;
            $('#charCount').text(len);
        });
    });
</script>
{% endblock %}
