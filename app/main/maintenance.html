<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع تحت الصيانة | Volt SMS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0f19;
            --card: #111827;
            --border: #1f2937;
            --txt: #f3f4f6;
            --muted: #9ca3af;
            --accent: #3b82f6;
        }

        body {
            background-color: var(--bg);
            color: var(--txt);
            font-family: 'Cairo', 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 16px;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
            color: var(--accent);
            font-size: 32px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 12px;
            color: #ffffff;
        }

        p {
            font-size: 16px;
            color: var(--muted);
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        .footer-text {
            font-size: 13px;
            color: var(--muted);
            font-family: 'Inter', sans-serif;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4);
            }
            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 15px rgba(59, 130, 246, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-box">
            <i class="fa fa-wrench"></i>
        </div>
        <h1>الموقع قيد الصيانة المؤقتة</h1>
        <p>{{ message or "عذراً، نقوم ببعض التحديثات الهامة لتحسين الخدمة حالياً. سنعود للعمل قريباً جداً." }}</p>
        
        <div class="divider"></div>
        
        <p style="font-family: 'Inter', sans-serif; font-size: 14px; direction: ltr; margin-bottom: 10px;">
            The website is currently under scheduled maintenance. We'll be back online shortly.
        </p>

        <span class="footer-text">Volt SMS &copy; 2026. All rights reserved.</span>
    </div>
</body>
</html>
