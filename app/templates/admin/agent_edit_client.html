{% extends "base.html" %}

{% block title %}Edit Client - DREEM SMS{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="breadcrumb">
            <h4><i class="fa fa-user"></i> Edit Client</h4>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-md-8 col-md-offset-2">
        <div class="widget-block">
            <div class="widget-head">
                <h5><i class="fa fa-edit"></i> Client Details</h5>
            </div>
            <div class="widget-content">
                <form method="POST" action="{{ url_for('admin.agent_edit_client', user_id=client.id) }}">
                    <div class="form-group">
                        <label>Username *</label>
                        <input type="text" name="username" class="form-control" value="{{ client.username }}" readonly>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" name="email" class="form-control" value="{{ client.email }}" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control">
                        <small class="text-muted">Leave blank to keep current password</small>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="name" class="form-control" value="{{ client.name or '' }}">
                    </div>
                    <div class="form-group">
                        <label>Company</label>
                        <input type="text" name="company" class="form-control" value="{{ client.company or '' }}">
                    </div>
                    <div class="form-group">
                        <label>Country</label>
                        <input type="text" name="country" class="form-control" value="{{ client.country or '' }}">
                    </div>
                    <div class="form-group">
                        <label>Active</label>
                        <select name="is_active" class="form-control">
                            <option value="1" {% if client.is_active %}selected{% endif %}>Yes</option>
                            <option value="0" {% if not client.is_active %}selected{% endif %}>No</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fa fa-save"></i> Save</button>
                    <a href="{{ url_for('main.clients') }}" class="btn btn-default"><i class="fa fa-arrow-left"></i> Back</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
