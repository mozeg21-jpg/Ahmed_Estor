<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volt SMS | Register New Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.75);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f3f4f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #064e3b, #0b0f19);
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .register-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 550px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(to right, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            color: #9ca3af;
            margin-bottom: 32px;
            font-size: 15px;
            text-align: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 480px) {
            .form-grid { grid-template-columns: 1fr; }
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group.full { grid-column: span 2; }
        @media (max-width: 480px) { .input-group.full { grid-column: span 1; } }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #d1d5db;
            font-weight: 600;
        }
        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 14.5px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        .account-type-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            grid-column: span 2;
        }
        @media (max-width: 480px) { .account-type-group { grid-column: span 1; } }

        .type-option {
            flex: 1;
            cursor: pointer;
            position: relative;
        }
        .type-option input { display: none; }
        .type-content {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
        }
        .type-option input:checked + .type-content {
            border-color: var(--primary);
            background: rgba(16, 185, 129, 0.1);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
        }
        .type-content i {
            font-size: 24px;
            color: #6b7280;
            margin-bottom: 8px;
            transition: color 0.3s;
        }
        .type-option input:checked + .type-content i {
            color: var(--primary);
        }
        .type-content span {
            display: block;
            font-weight: 700;
            font-size: 15px;
        }

        .register-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }
        .register-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
        }

        .alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            text-align: left;
        }

        .footer-links {
            margin-top: 24px;
            font-size: 14px;
            color: #9ca3af;
            text-align: center;
        }
        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <h1>Create Account</h1>
        <p class="subtitle">Join us today and start your Volt SMS experience</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert">
                        <i class="fa fa-exclamation-circle"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-grid">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="e.g., ahmed_2024" required>
                </div>
                
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="example@mail.com" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" name="password_confirm" placeholder="••••••••" required>
                </div>

                <div class="account-type-group">
                    <label class="type-option">
                        <input type="radio" name="account_type" value="client" checked>
                        <div class="type-content">
                            <i class="fa fa-user"></i>
                            <span>Client Account</span>
                        </div>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="account_type" value="agent" disabled title="Contact Admin for Agent account">
                        <div class="type-content">
                            <i class="fa fa-briefcase"></i>
                            <span>Agent Account</span>
                        </div>
                    </label>
                </div>
            </div>

            <button type="submit" class="register-btn">
                <span>Confirm Registration</span>
                <i class="fa fa-user-plus"></i>
            </button>
        </form>

        <div class="footer-links">
            Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
        </div>
    </div>

</body>
</html>
