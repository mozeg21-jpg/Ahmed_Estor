<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SMS Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .limiter { width: 100%; max-width: 500px; margin: 20px; }
        .container-login {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .wrap-login { padding: 40px; width: 100%; }
        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #e94560;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .input:focus {
            border-color: #e94560;
            outline: none;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            flex: 1;
            transition: all 0.3s ease;
        }
        .radio-option:hover {
            border-color: #e94560;
        }
        .radio-option.selected {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }
        .radio-option input {
            display: none;
        }
        .radio-option .icon {
            font-size: 24px;
            color: #666;
        }
        .radio-option.selected .icon {
            color: #e94560;
        }
        .radio-option .text {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        .radio-option .desc {
            font-size: 11px;
            color: #999;
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #e94560 0%, #c23152 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }
        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .alert-danger { background: #ffe0e6; color: #c23152; border: 1px solid #f5c6cb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .text-center { text-align: center; }
        .text-muted { color: #999; }
    </style>
</head>
<body>
    <div class="limiter">
        <div class="container-login">
            <div class="wrap-login">
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <h1 class="login-title">Create Account</h1>

                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="input" placeholder="Choose a username (min 4 chars)" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="input" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="input" placeholder="Create password (min 6 chars)" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" name="password_confirm" class="input" placeholder="Confirm your password" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Account Type</label>
                        <div class="radio-group">
                            <label class="radio-option selected" id="client-option">
                                <input type="radio" name="account_type" value="client" checked>
                                <span class="icon">
                                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                                        <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.155-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/>
                                    </svg>
                                </span>
                                <span class="text">Client</span>
                            </label>
                            <label class="radio-option" id="agent-option">
                                <input type="radio" name="account_type" value="agent">
                                <span class="icon">
                                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                                        <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
                                    </svg>
                                </span>
                                <span class="text">Agent</span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="login-btn">Register</button>
                </form>

                <p class="text-center" style="margin-top: 20px;">
                    Already have an account? <a href="{{ url_for('auth.login') }}" style="color: #e94560;">Login here</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Handle radio button styling
        document.querySelectorAll('input[name="account_type"]').forEach(function(radio) {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.radio-option').forEach(function(opt) {
                    opt.classList.remove('selected');
                });
                if (this.value === 'client') {
                    document.getElementById('client-option').classList.add('selected');
                } else {
                    document.getElementById('agent-option').classList.add('selected');
                }
            });
        });
    </script>
</body>
</html>
