<!DOCTYPE html>
<html lang="en">
<head>
	<title>DREEM SMS | Login</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" type="image/png" href="/static/img/favicon.ico"/>
	<link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" type="text/css" href="/static/css/loginutil.css">
	<link rel="stylesheet" type="text/css" href="/static/css/loginmain.css">
    <style>
        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            font-family: sans-serif;
        }
        .alert-danger { background: #ffe0e6; color: #c23152; border: 1px solid #f5c6cb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
	<div class="limiter">
		<div class="container-login100">
			<div class="wrap-login100" style="background: rgba(20, 20, 20, 0.65); backdrop-filter: blur(12px); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); padding: 45px; display: flex; align-items: center; justify-content: center; gap: 40px; flex-wrap: wrap; max-width: 850px; width: 100%;">
				<div style="flex: 1; min-width: 280px; max-width: 380px; display: flex; align-items: center; justify-content: center; padding: 10px;">
					<img src="https://i.ibb.co/qLfHSszW/file-00000000274871f4b6397a8ff18ca414.png" style="width: 100%; height: auto; max-height: 280px; object-fit: contain; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));" alt="Logo" />
				</div>
				
                <form action="{{ url_for('auth.login') }}" method="post" class="login100-form validate-form" style="flex: 1; min-width: 280px; max-width: 320px; margin: 0;">
                    <span class="login100-form-title" style="color:#FFF; padding-bottom:15px; text-align: center;">
                        Login to Account
                    </span><br />

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }}">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <input type="hidden" name="captcha_token" value="{{ captcha_token }}">

					<div class="wrap-input100 validate-input" data-validate="Valid Username is required">
						<input class="input100" type="text" name="username" placeholder="Username" required>
						<span class="focus-input100"></span>
						<span class="symbol-input100">
							<i class="fa fa-envelope" aria-hidden="true"></i>
						</span>
					</div>

					<div class="wrap-input100 validate-input" data-validate="Password is required">
						<input class="input100" type="password" name="password" placeholder="Password" required>
						<span class="focus-input100"></span>
						<span class="symbol-input100">
							<i class="fa fa-lock" aria-hidden="true"></i>
						</span>
					</div>

					<div class="wrap-input100" style="color:#FFF; font-family: sans-serif; margin-bottom: 20px;">
						What is {{ num1 }} + {{ num2 }} = ? : 
                        <input type="number" name="capt" style="border:1px solid #000; border-radius:7px; width:120px; padding:5px; color:#000; background-color:#FFF; display:inline-block; vertical-align:middle; margin-left:10px;" placeholder="Answer" required>
					</div>
					
					<div class="container-login100-form-btn">
						<button class="login100-form-btn" type="submit">
							Login
						</button>
					</div>
					<br><br>
				</form>
			</div>
		</div>
	</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
</body>
</html>
