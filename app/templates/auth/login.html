<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فولت SMS | تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.75);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f3f4f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top right, #1e3a8a, #0b0f19);
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            margin-bottom: 32px;
        }
        .logo img {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 2px solid var(--primary);
        }

        h1 {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(to left, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            color: #9ca3af;
            margin-bottom: 32px;
            font-size: 15px;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
            text-align: right;
        }
        .input-group i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            transition: color 0.3s;
        }
        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 48px 14px 16px;
            color: white;
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        .input-group input:focus + i {
            color: var(--primary);
        }

        .captcha-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed var(--border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .captcha-text {
            font-weight: 700;
            color: #d1d5db;
        }
        .captcha-input {
            width: 100px;
            background: white;
            border: none;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            font-weight: 900;
            color: var(--bg);
        }

        .login-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .login-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
        .login-btn:active {
            transform: translateY(0);
        }

        .alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            text-align: right;
        }

        .footer-links {
            margin-top: 32px;
            font-size: 14px;
            color: #9ca3af;
        }
        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">
            <img src="https://i.ibb.co/zVcT0C1F/IMG-20260706-211650-758.jpg" alt="Logo">
        </div>
        
        <h1>تسجيل الدخول</h1>
        <p class="subtitle">مرحباً بك مجدداً في منصة فولت SMS</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert">
                        <i class="fa fa-exclamation-circle"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.login') }}" method="post">
            <input type="hidden" name="captcha_token" value="{{ captcha_token }}">
            
            <div class="input-group">
                <input type="text" name="username" placeholder="اسم المستخدم" required autocomplete="username">
                <i class="fa fa-user"></i>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="كلمة المرور" required autocomplete="current-password">
                <i class="fa fa-lock"></i>
            </div>

            <div class="captcha-box">
                <span class="captcha-text">ما ناتج: {{ num1 }} + {{ num2 }} ؟</span>
                <input type="number" name="capt" class="captcha-input" placeholder="الناتج" required>
            </div>

            <button type="submit" class="login-btn">
                <span>دخول للمنصة</span>
                <i class="fa fa-arrow-left"></i>
            </button>
        </form>

        <div class="footer-links">
            ليس لديك حساب؟ <a href="{{ url_for('auth.register') }}">تواصل مع الإدارة</a>
        </div>
    </div>

</body>
</html>
