<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{ asset.title or asset.filename }}</title>
<style>
  body { margin: 0; background: #111; }
  iframe {
    display: block;
    width: 100vw;
    height: 100vh;
    border: none;
  }
</style>
</head>
<body>
{#
  SECURITY: developer HTML is rendered inside a sandboxed iframe.
  sandbox="allow-scripts" allows JS inside the frame but blocks:
    - access to parent cookies/session (no allow-same-origin)
    - form submissions to other origins
    - popups
  This prevents stored XSS from escaping to the main app context.
#}
<iframe
  sandbox="allow-scripts allow-forms"
  srcdoc="{{ asset.content | e }}"
  title="{{ asset.title or asset.filename | e }}">
</iframe>
</body>
</html>
