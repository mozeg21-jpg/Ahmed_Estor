<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Internal Server Error | DREEM SMS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .error-container {
            text-align: center;
            color: white;
            padding: 20px;
            max-width: 500px;
        }
        .error-code {
            font-size: 100px;
            font-weight: 700;
            color: #e94560;
            text-shadow: 0 5px 20px rgba(233, 69, 96, 0.3);
            margin-bottom: 10px;
        }
        .error-message {
            font-size: 24px;
            margin: 20px 0;
            font-weight: 600;
        }
        .home-link {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #e94560 0%, #c23152 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        .home-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }
    </style>
</head>
<body>
    <div class="error-container" style="direction: rtl;">
        <div class="error-code">500</div>
        <div class="error-message">خطأ داخلي في الخادم</div>
        <p style="margin: 15px 0; color: rgba(255,255,255,0.7); line-height: 1.6;">حدث خطأ غير متوقع في الخادم أثناء معالجة طلبك. يرجى إعادة تحميل الصفحة أو المحاولة لاحقاً.</p>
        <a href="/" class="home-link">الذهاب للرئيسية</a>
    </div>
</body>
</html>
