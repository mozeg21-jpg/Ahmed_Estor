################################################################################
# Providers Configuration File
# 
# This file contains the settings for all SMPP providers.
# The system will automatically read this file and connect to all enabled providers.
# 
# Variables:
# - name: (String) [Required] A unique name for the provider. Ex: "Twilio_SMPP"
# - host: (String) [Required] The IP address or domain name of the SMPP server. Ex: "smpp.example.com"
# - port: (Integer) [Required] The port number. Usually 2775. Ex: 2775
# - system_id: (String) [Required] The username provided by the SMPP server. Ex: "admin"
# - password: (String) [Required] The password for the system_id. Ex: "password123"
# - system_type: (String) [Optional] The type of system. Usually empty or "SMPP". Ex: "SMPP"
# - mode: (String) [Required] Connection mode: "receiver" or "transceiver". Ex: "receiver"
# - interface_version: (Integer) [Optional] SMPP version, usually 34 (SMPP v3.4). Ex: 34
# - ton: (Integer) [Optional] Type of Number for binding. Default is 0. Ex: 0
# - npi: (Integer) [Optional] Numbering Plan Indicator for binding. Default is 0. Ex: 0
# - address_range: (String) [Optional] The range of numbers to receive from. Default is "". Ex: "^\+?1"
# - heartbeat_interval: (Integer) [Optional] Enquire Link interval in seconds. Ex: 30
# - auto_reconnect: (Boolean) [Required] Whether to reconnect automatically on failure. Ex: true
# - reconnect_delay: (Integer) [Optional] Wait time in seconds before reconnecting. Ex: 5
# - connection_timeout: (Integer) [Optional] Socket connection timeout in seconds. Ex: 10
# - read_timeout: (Integer) [Optional] Socket read timeout in seconds. Ex: 60
# - enabled: (Boolean) [Required] Only providers with enabled=true will be started. Ex: true
################################################################################

providers:
####################################################
# Provider 1
# Example Configuration for Provider 1
####################################################
  - name: "Provider_1"
    host: "127.0.0.1"
    port: 2775
    system_id: "admin1"
    password: "password1"
    system_type: "SMPP"
    mode: "receiver"
    interface_version: 34
    ton: 0
    npi: 0
    address_range: ""
    heartbeat_interval: 30
    auto_reconnect: true
    reconnect_delay: 5
    connection_timeout: 10
    read_timeout: 60
    enabled: true

